name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  migrate-db:
    name: Migrate Supabase
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.107.0

      - name: Apply migrations
        env:
          SUPABASE_MIGRATION_DB_URL: ${{ secrets.SUPABASE_MIGRATION_DB_URL }}
        run: |
          if [ -z "$SUPABASE_MIGRATION_DB_URL" ]; then
            echo "Missing GitHub secret: SUPABASE_MIGRATION_DB_URL"
            echo "Set it to the Supabase pooler/direct Postgres URI used for CI migrations."
            exit 1
          fi
          # Database was bootstrapped outside CLI history; mark known versions as applied
          # so CI migrations are idempotent and non-interactive.
          supabase migration repair --status applied 20250506120000 --db-url "$SUPABASE_MIGRATION_DB_URL" || true
          supabase migration repair --status applied 20250507120000 --db-url "$SUPABASE_MIGRATION_DB_URL" || true
          supabase migration repair --status applied 20250508120000 --db-url "$SUPABASE_MIGRATION_DB_URL" || true
          supabase migration repair --status applied 20260507005425 --db-url "$SUPABASE_MIGRATION_DB_URL" || true
          supabase migration repair --status applied 20260507011724 --db-url "$SUPABASE_MIGRATION_DB_URL" || true
          supabase migration repair --status applied 20260508022535 --db-url "$SUPABASE_MIGRATION_DB_URL" || true
          supabase migration repair --status applied 20260508022548 --db-url "$SUPABASE_MIGRATION_DB_URL" || true
          supabase migration repair --status applied 20260508032649 --db-url "$SUPABASE_MIGRATION_DB_URL" || true
          supabase migration repair --status applied 20260508032839 --db-url "$SUPABASE_MIGRATION_DB_URL" || true
          supabase migration repair --status applied 20260508043109 --db-url "$SUPABASE_MIGRATION_DB_URL" || true
          supabase db push --include-all --yes --db-url "$SUPABASE_MIGRATION_DB_URL"

  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: migrate-db
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build deployment artifact
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
