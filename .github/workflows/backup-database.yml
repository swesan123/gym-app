name: Backup Database

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client rclone

      - name: Validate required secrets
        env:
          SUPABASE_MIGRATION_DB_URL: ${{ secrets.SUPABASE_MIGRATION_DB_URL }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          if [ -z "$SUPABASE_MIGRATION_DB_URL" ]; then
            echo "Missing secret: SUPABASE_MIGRATION_DB_URL"
            exit 1
          fi
          if [ -z "$GCP_WORKLOAD_IDENTITY_PROVIDER" ]; then
            echo "Missing secret: GCP_WORKLOAD_IDENTITY_PROVIDER"
            exit 1
          fi
          if [ -z "$GCP_SERVICE_ACCOUNT" ]; then
            echo "Missing secret: GCP_SERVICE_ACCOUNT"
            exit 1
          fi
          if [ -z "$GOOGLE_DRIVE_FOLDER_ID" ]; then
            echo "Missing secret: GOOGLE_DRIVE_FOLDER_ID"
            exit 1
          fi

      - name: Create SQL backup
        env:
          SUPABASE_MIGRATION_DB_URL: ${{ secrets.SUPABASE_MIGRATION_DB_URL }}
        run: |
          timestamp="$(date -u +%Y%m%d-%H%M%S)"
          backup_file="gym-app-backup-${timestamp}.sql.gz"
          pg_dump "$SUPABASE_MIGRATION_DB_URL" --no-owner --no-privileges | gzip > "$backup_file"
          echo "BACKUP_FILE=$backup_file" >> "$GITHUB_ENV"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload backup to Google Drive
        env:
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          access_token="$(gcloud auth print-access-token --scopes=https://www.googleapis.com/auth/drive)"
          token_json="$(ACCESS_TOKEN="$access_token" python3 -c 'import json, os; print(json.dumps({"access_token": os.environ["ACCESS_TOKEN"], "token_type": "Bearer"}))')"
          mkdir -p "$RUNNER_TEMP/rclone"
          cat > "$RUNNER_TEMP/rclone/rclone.conf" <<EOF
          [gdrive]
          type = drive
          scope = drive
          token = ${token_json}
          root_folder_id = ${GOOGLE_DRIVE_FOLDER_ID}
          EOF
          export RCLONE_CONFIG="$RUNNER_TEMP/rclone/rclone.conf"
          rclone copy "$BACKUP_FILE" "gdrive:"

      - name: Upload backup artifact (optional)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BACKUP_FILE }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 14
