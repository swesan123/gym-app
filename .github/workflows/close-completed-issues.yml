name: Close completed issues

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/close-completed-issues.yml

permissions:
  issues: write

jobs:
  close-and-create:
    runs-on: ubuntu-latest
    steps:
      - name: Close implemented issues and create follow-up
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const closings = [
              {
                number: 63,
                comment:
                  "Implemented: removed the Type column from the active workout table. Warmup sets still show a compact **W** badge; working sets no longer display a type control.",
              },
              {
                number: 64,
                comment:
                  'Implemented: discard now opens an "Are you sure?" confirmation modal in `DraftWorkoutBanner` before deleting a draft workout.',
              },
              {
                number: 65,
                comment:
                  "Implemented: history now sorts workouts within each week by date (newest first), with `created_at` as a tiebreaker.",
              },
              {
                number: 66,
                comment:
                  "Implemented: rest timer is skipped automatically on the last set of each exercise.",
              },
              {
                number: 67,
                comment:
                  "Implemented: rest timer persists using an absolute `endAt` timestamp in `sessionStorage`, so it keeps counting through tab backgrounding and page refresh.",
              },
              {
                number: 68,
                comment:
                  "Implemented: timed exercises have an inline ▶ countdown in both List and Focus views.",
              },
              {
                number: 69,
                comment:
                  "Implemented: assisted-weight progressive overload now moves in the correct direction (less assistance = progression).",
              },
              {
                number: 70,
                comment:
                  "Implemented: per-set progressive overload for weighted exercises, gated on reps and RIR from the last completed session.",
              },
              {
                number: 71,
                comment:
                  "Implemented: draft workout creation is parallelized with `Promise.all` to reduce the delay after tapping Start workout.",
              },
              {
                number: 72,
                comment:
                  "Implemented: List/Focus toggle on the active workout page with a step-by-step `FocusSetCard` view.",
              },
              {
                number: 73,
                comment:
                  "Implemented: per-set Done button with `completed_at` tracking, field validation before Done, and finish-workout blocked until all sets are marked Done.",
              },
              {
                number: 90,
                comment:
                  "Implemented: per-exercise duration start/end/step settings for timed exercises in Exercise Settings, with custom duration presets in the active workout (falls back to global presets when unset).",
              },
              {
                number: 91,
                comment:
                  "Implemented: progression now ranks workouts by recency across splits (`pickLatestWorkoutPerExercise`) so moving an exercise to a new split no longer blocks weight progression.",
              },
              {
                number: 92,
                comment:
                  "Implemented: previous-weight lookup uses most-recent-by-key ranking so a newer bodyweight session with null extra weight is not shadowed by an older logged weight.",
              },
              {
                number: 93,
                comment:
                  "Implemented: Skip → on each exercise in List and Focus views reorders exercises for the current session only (swaps one position forward within the same stretch section).",
              },
              {
                number: 94,
                comment:
                  "Implemented: live elapsed-time counter in the active workout header (`useWorkoutElapsed`), ticking from workout start.",
              },
              {
                number: 95,
                comment:
                  "Implemented: `started_at` stamped when rest ends (or is skipped) before the next set; per-set elapsed time shown on the completed workout summary in History.",
              },
            ];

            for (const { number, comment } of closings) {
              const { data: issue } = await github.rest.issues.get({
                owner,
                repo,
                issue_number: number,
              });
              if (issue.state === "closed") {
                core.info(`Issue #${number} already closed — skipping`);
                continue;
              }
              await github.rest.issues.createComment({ owner, repo, issue_number: number, body: comment });
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: number,
                state: "closed",
                state_reason: "completed",
              });
              core.info(`Closed #${number}`);
            }

            const newTitle = "Remove volume number from Focus view";
            const { data: existing } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100,
            });
            if (existing.some((i) => i.title === newTitle)) {
              core.info("Follow-up issue already exists — skipping create");
              return;
            }

            await github.rest.issues.create({
              owner,
              repo,
              title: newTitle,
              body: [
                "The Focus view currently shows a **Vol** number below the set fields (e.g. `Vol 1,200`).",
                "",
                "## Request",
                "Remove the volume display from Focus mode to reduce clutter during set execution.",
                "",
                "## Notes",
                "- Volume should remain visible in List view and on the completed workout summary.",
                "- No change to volume calculation — UI-only cleanup in `FocusSetCard`.",
              ].join("\n"),
              labels: ["type: enhancement", "ui"],
            });
            core.info("Created follow-up issue");
